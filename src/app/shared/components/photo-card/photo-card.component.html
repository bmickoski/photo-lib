<button type="button" class="card" (click)="cardClicked.emit(photo())" [class.is-favorite]="isFavorite()">
  <img [src]="photo().url" [alt]="'Photo by ' + photo().author" loading="lazy" />
  @if (isFavorite()) {
    <span class="favorite-badge" aria-label="In favorites">&#9829;</span>
  }
  <div class="hover-overlay" [class.view-mode]="viewMode() === 'view'">
    <span class="overlay-icon">{{ viewMode() === 'view' ? '&#8599;' : '&#9829;' }}</span>
  </div>
</button>
